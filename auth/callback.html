<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delta SSO Callback PoC</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #162033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(760px, 100%);
      border: 1px solid #d9e0ec;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 44px rgba(31, 48, 76, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: #526071;
      line-height: 1.55;
    }

    dl {
      display: grid;
      gap: 12px;
      margin: 22px 0 0;
    }

    div.row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    dt {
      font-weight: 700;
      color: #26364d;
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #eef2f8;
      border-radius: 6px;
      padding: 10px 12px;
      color: #172338;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #10141d;
        color: #f4f7fb;
      }

      main {
        background: #171d29;
        border-color: #313a4c;
        box-shadow: none;
      }

      p {
        color: #b5bfd0;
      }

      dt {
        color: #ecf2fb;
      }

      dd {
        background: #222b3a;
        color: #f7fbff;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Attacker-controlled callback reached</h1>
    <p>Delta/eToro SSO redirected the browser to this Vercel domain and preserved the callback query parameters.</p>
    <dl>
      <div class="row">
        <dt>Status</dt>
        <dd id="status">loading</dd>
      </div>
      <div class="row">
        <dt>Error</dt>
        <dd id="error">loading</dd>
      </div>
      <div class="row">
        <dt>Full URL</dt>
        <dd id="url">loading</dd>
      </div>
    </dl>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const text = (value, fallback) => value && value.trim() ? value : fallback;

    document.getElementById('status').textContent = text(params.get('status'), '(not supplied)');
    document.getElementById('error').textContent = text(params.get('error'), '(not supplied)');
    document.getElementById('url').textContent = window.location.href;
  </script>
</body>
</html>
